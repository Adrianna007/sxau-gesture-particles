<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>农大交互粒子系统</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        .input_video { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; transform: scaleX(-1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.88); z-index: -1; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
<video class="input_video" autoplay playsinline></video>
<div class="overlay"></div>

<script>
    // 1. 初始化场景与纹理
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 50;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. 文字像素采样 (精准控制占比: 2/3 宽，1/3 高)
    function getTextCoordinates(text, colorHex) {
        const canvas = document.createElement('canvas');
        canvas.width = 1200; canvas.height = 600;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.font = 'bold 150px sans-serif';
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 600, 300);
        
        const imgData = ctx.getImageData(0,0, 1200, 600).data;
        const coords = [];
        for(let y=0; y<600; y+=3) {
            for(let x=0; x<1200; x+=3) {
                if(imgData[(x+y*1200)*4] > 128) {
                    coords.push({
                        x: (x - 600) * 0.25, // 宽度系数
                        y: -(y - 300) * 0.18, // 高度系数
                        z: (Math.random()-0.5)*2,
                        color: new THREE.Color(colorHex)
                    });
                }
            }
        }
        return coords;
    }

    const data1 = getTextCoordinates("欢迎报考", 0xFFFF00); // 黄色
    const data2 = getTextCoordinates("山西农业大学", 0xFF0000); // 红色
    
    let currentData = data1;
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(Math.max(data1.length, data2.length) * 3);
    const colors = new Float32Array(Math.max(data1.length, data2.length) * 3);
    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // 3. MediaPipe 交互逻辑
    let pointer = new THREE.Vector3(0,0,0);
    const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.onResults(results => {
        if(results.multiHandLandmarks?.length > 0) {
            const h = results.multiHandLandmarks[0];
            // 指尖避让
            pointer.set((0.5-h[8].x)*50, -(h[8].y-0.5)*30, 0);
            
            // 握拳判断 (简易距离判断)
            const d = Math.hypot(h[4].x - h[8].x, h[4].y - h[8].y);
            currentData = d < 0.15 ? data1 : data2;
        }
    });
    
    new Camera(document.querySelector('video'), { onFrame: async () => await hands.send({image: document.querySelector('video')}) }).start();

    // 4. 渲染循环
    function animate() {
        requestAnimationFrame(animate);
        const p = geometry.attributes.position.array;
        const c = geometry.attributes.color.array;
        
        currentData.forEach((d, i) => {
            let tx = d.x, ty = d.y, tz = d.z;
            const dist = Math.hypot(p[i*3] - pointer.x, p[i*3+1] - pointer.y);
            if(dist < 15) { // 躲避范围
                tx += (p[i*3] - pointer.x) * 0.5;
                ty += (p[i*3+1] - pointer.y) * 0.5;
            }
            p[i*3] += (tx - p[i*3]) * 0.1;
            p[i*3+1] += (ty - p[i*3+1]) * 0.1;
            p[i*3+2] += (tz - p[i*3+2]) * 0.1;
            c[i*3] = d.color.r; c[i*3+1] = d.color.g; c[i*3+2] = d.color.b;
        });
        geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
