<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山西农业大学 - 震撼粒子空间</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        .input_video { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; transform: scaleX(-1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: -1; } /* 颜色加深，突出粒子发光 */
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { font-size: 26px; margin: 0 0 10px 0; background: linear-gradient(90deg, #00FF87, #FF007F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 10px rgba(255,0,127,0.4); }
        p { margin: 5px 0; font-size: 15px; opacity: 0.9; text-shadow: 0 2px 4px rgba(0,0,0,1); }
        .status-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border: 1px solid #555; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,255,135,0.2); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<video class="input_video" autoplay playsinline></video>
<div class="overlay"></div>

<div id="ui">
    <div class="status-box">
        <h1>🌌 震撼粒子空间</h1>
        <p id="status-text">系统状态：AI 视觉模型初始化中...</p>
        <p>当前触发：<span id="gesture-text" style="color: #FF007F; font-weight: bold; font-size: 18px;">等待大幅度动作</span></p>
        <p style="margin-top: 10px; font-size: 13px; color: #ddd; line-height: 1.6;">👉 <b>高稳定互动指南：</b><br>
        1. <b>大幅度从上往下滑：</b> 坠入“欢迎报考”<br>
        2. <b>大幅度从左向右滑：</b> 划入“山西农业大学”<br>
        3. <b>缓慢握拳 / 张开：</b> 柔和控制粒子收缩扩散</p>
    </div>
</div>

<script>
    // ==========================================
    // 1. 文字像素采样 (保持高浓度)
    // ==========================================
    function getTextCoordinates(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 400; // 加宽画布，防止文字被裁
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = '900 95px "Microsoft YaHei", sans-serif'; // 字体更粗大
        ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const coordinates = [];
        const step = 2; 
        for (let y = 0; y < canvas.height; y += step) {
            for (let x = 0; x < canvas.width; x += step) {
                const index = (x + y * canvas.width) * 4;
                if (imgData[index] > 128) {
                    coordinates.push(new THREE.Vector3(
                        (x - canvas.width / 2) * 0.12, // 间距微调，让字更大
                        -(y - canvas.height / 2) * 0.12,
                        (Math.random() - 0.5) * 3 // Z轴厚度增加
                    ));
                }
            }
        }
        return coordinates;
    }

    // ==========================================
    // 2. Three.js 初始化
    // ==========================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 45; // 镜头拉远一点，容纳更震撼的视觉
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ==========================================
    // 3. 背景星空粒子系统 (更明亮)
    // ==========================================
    const bgParticleCount = 4000;
    const bgGeometry = new THREE.BufferGeometry();
    const bgPositions = new Float32Array(bgParticleCount * 3);
    const bgColors = new Float32Array(bgParticleCount * 3);
    const colorHelper = new THREE.Color();

    for (let i = 0; i < bgParticleCount; i++) {
        bgPositions[i * 3] = (Math.random() - 0.5) * 400;
        bgPositions[i * 3 + 1] = (Math.random() - 0.5) * 400;
        bgPositions[i * 3 + 2] = (Math.random() - 0.5) * 200 - 80; 

        // 背景粒子偏向粉色、紫色、青色
        colorHelper.setHSL(Math.random() * 0.5 + 0.5, 0.9, 0.6);
        bgColors[i * 3] = colorHelper.r;
        bgColors[i * 3 + 1] = colorHelper.g;
        bgColors[i * 3 + 2] = colorHelper.b;
    }
    bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
    bgGeometry.setAttribute('color', new THREE.BufferAttribute(bgColors, 3));

    const bgMaterial = new THREE.PointsMaterial({
        size: 0.4, // 背景星星变大
        vertexColors: true,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
    });
    const bgParticles = new THREE.Points(bgGeometry, bgMaterial);
    scene.add(bgParticles);

    // ==========================================
    // 4. 主干文字粒子系统 (颗粒变大，更夺目)
    // ==========================================
    const coordsText1 = getTextCoordinates("欢迎报考");
    const coordsText2 = getTextCoordinates("山西农业大学");
    const particleCount = Math.max(coordsText1.length, coordsText2.length);

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 200;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 200;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
        targetPositions[i * 3] = positions[i * 3];
        targetPositions[i * 3 + 1] = positions[i * 3 + 1];
        targetPositions[i * 3 + 2] = positions[i * 3 + 2];
        
        colorHelper.setHSL(0.5, 1.0, 0.5);
        colors[i * 3] = colorHelper.r;
        colors[i * 3 + 1] = colorHelper.g;
        colors[i * 3 + 2] = colorHelper.b;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const material = new THREE.PointsMaterial({ 
        size: 0.35, // 【改动】单颗文字粒子变大，增强厚重感和发光感
        vertexColors: true, 
        transparent: true, 
        opacity: 1.0, 
        blending: THREE.AdditiveBlending 
    });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // ==========================================
    // 5. 核心物理与状态变量
    // ==========================================
    let targetDispersion = 1.0;  // 目标张合度 (手势直接控制)
    let smoothedDispersion = 1.0; // 平滑后的张合度 (实际渲染用，防抖动)
    
    let entryOffset = new THREE.Vector3(0, 0, 0); 
    let currentTargetCoords = null;
    let time = 0; 

    // 切换目标并计算极高对比度的渐变色
    function changeTarget(coordsArray, hueStart, hueEnd) {
        const colorAttr = geometry.attributes.color;
        let minX = Infinity, maxX = -Infinity;
        coordsArray.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
        });

        for (let i = 0; i < particleCount; i++) {
            const index = i % coordsArray.length;
            const targetX = coordsArray[index].x;
            targetPositions[i * 3] = targetX;
            targetPositions[i * 3 + 1] = coordsArray[index].y;
            targetPositions[i * 3 + 2] = coordsArray[index].z;

            // 流光渐变色
            const ratio = (targetX - minX) / (maxX - minX); 
            const currentHue = hueStart + ratio * (hueEnd - hueStart);
            colorHelper.setHSL(currentHue, 1.0, 0.55); // 提高亮度
            
            colorAttr.array[i * 3] = colorHelper.r;
            colorAttr.array[i * 3 + 1] = colorHelper.g;
            colorAttr.array[i * 3 + 2] = colorHelper.b;
        }
        colorAttr.needsUpdate = true;
    }

    // ==========================================
    // 6. MediaPipe 手势与滑动检测 (降低灵敏度)
    // ==========================================
    const videoElement = document.querySelector('.input_video');
    const gestureText = document.getElementById('gesture-text');
    let historyX = []; let historyY = []; let swipeCooldown = 0; 

    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            // 【灵敏度修改 1】手势张合度计算
            const wrist = landmarks[0];
            const middleTip = landmarks[12];
            const handSize = Math.sqrt(Math.pow(wrist.x - middleTip.x, 2) + Math.pow(wrist.y - middleTip.y, 2));
            
            // 计算目标扩散值，但不再直接赋给粒子，而是存起来用于稍后的平滑过渡
            targetDispersion = Math.max(0.1, Math.min(3.5, (handSize - 0.1) * 6.0));

            // 【灵敏度修改 2】滑动检测逻辑
            const center = landmarks[9]; 
            historyX.push(center.x); historyY.push(center.y);
            if (historyX.length > 20) { historyX.shift(); historyY.shift(); } // 延长轨迹判断帧数
            
            if (swipeCooldown > 0) swipeCooldown--;

            // 只有当积累了足够帧数，且不在冷却中时才判断
            if (historyX.length === 20 && swipeCooldown === 0) {
                const dx = historyX[19] - historyX[0];
                const dy = historyY[19] - historyY[0];

                // 阈值从 0.15 提高到 0.28，必须有大幅度的挥手动作才会触发！
                if (dy > 0.28 && Math.abs(dy) > Math.abs(dx)) {
                    gestureText.innerText = "向下滑动 (欢迎报考)";
                    gestureText.style.color = "#00FFFF";
                    currentTargetCoords = coordsText1;
                    
                    // 【视觉强化】青蓝色 渐变到 紫红色
                    changeTarget(coordsText1, 0.5, 0.85); 
                    entryOffset.set(0, 60, 0); 
                    
                    // 冷却时间延长到 60 帧 (约2秒)，防止一次挥手触发多次
                    swipeCooldown = 60; 
                } 
                else if (dx < -0.28 && Math.abs(dx) > Math.abs(dy)) {
                    gestureText.innerText = "向右滑动 (山西农业大学)";
                    gestureText.style.color = "#FFD700";
                    currentTargetCoords = coordsText2;
                    
                    // 【视觉强化】金黄色 渐变到 烈焰红
                    changeTarget(coordsText2, 0.12, 0.0); 
                    entryOffset.set(-80, 0, 0); 
                    swipeCooldown = 60;
                }
            }
        } else {
            // 没有手时，目标状态恢复正常
            targetDispersion = 1.0;
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    cameraUtils.start().then(() => {
        document.getElementById('status-text').innerText = "系统状态：AI 引擎全速运行中";
        document.getElementById('status-text').style.color = "#00FF87";
    });

    // ==========================================
    // 7. 动画渲染循环
    // ==========================================
    function animate() {
        requestAnimationFrame(animate);
        time += 0.05;

        // 背景星空持续缓慢旋转、漂浮
        bgParticles.rotation.y += 0.001;
        bgParticles.rotation.x += 0.0005;

        entryOffset.lerp(new THREE.Vector3(0, 0, 0), 0.06);

        // 【灵敏度核心防抖】让实际的张合度，缓慢去追赶目标张合度，彻底消除握拳时的画面闪烁
        smoothedDispersion += (targetDispersion - smoothedDispersion) * 0.08;

        const posAttr = geometry.attributes.position;
        const currentArr = posAttr.array;

        for (let i = 0; i < particleCount; i++) {
            const idxX = i * 3;
            const idxY = i * 3 + 1;
            const idxZ = i * 3 + 2;

            // 应用平滑后的张合度
            let targetX = targetPositions[idxX] * smoothedDispersion + entryOffset.x;
            let targetY = targetPositions[idxY] * smoothedDispersion + entryOffset.y;
            let targetZ = targetPositions[idxZ] * smoothedDispersion + entryOffset.z;

            // 【视觉强化】极其明显的深水波浪浮动！振幅从 0.4 提升到了 1.5
            targetY += Math.sin(time + i * 0.02) * 1.5;
            targetX += Math.cos(time + i * 0.02) * 0.8;

            currentArr[idxX] += (targetX - currentArr[idxX]) * 0.12;
            currentArr[idxY] += (targetY - currentArr[idxY]) * 0.12;
            currentArr[idxZ] += (targetZ - currentArr[idxZ]) * 0.12;
        }

        posAttr.needsUpdate = true;
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
