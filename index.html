<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山西农业大学 - 绚丽粒子空间</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        
        .input_video { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; transform: scaleX(-1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.75); z-index: -1; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { font-size: 24px; margin: 0 0 10px 0; background: linear-gradient(90deg, #00FF87, #60EFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 10px rgba(0,255,135,0.3); }
        p { margin: 5px 0; font-size: 14px; opacity: 0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .status-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid #444; backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(0,255,135,0.1); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<video class="input_video" autoplay playsinline></video>
<div class="overlay"></div>

<div id="ui">
    <div class="status-box">
        <h1>🌌 绚丽粒子空间</h1>
        <p id="status-text">系统状态：正在加载 AI 模型...</p>
        <p>当前触发：<span id="gesture-text" style="color: #60EFFF; font-weight: bold;">背景星尘浮动</span></p>
        <p style="margin-top: 10px; font-size: 12px; color: #ccc;">👉 互动指南：<br>
        1. <b>手掌从上往下滑：</b> 坠入“欢迎报考”<br>
        2. <b>手掌从左向右滑：</b> 划入“山西农业大学”<br>
        3. <b>握紧拳头 / 张开手掌：</b> 控制粒子收缩与扩散</p>
    </div>
</div>

<script>
    // ==========================================
    // 1. 文字像素采样 (提高浓度)
    // ==========================================
    function getTextCoordinates(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 400;
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 字体稍微加粗加大，以承载更多粒子
        ctx.font = '900 90px "Microsoft YaHei", sans-serif';
        ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const coordinates = [];
        
        // 【浓度提升】步长从 4 改为 2，粒子数量大幅度增加
        const step = 2; 
        for (let y = 0; y < canvas.height; y += step) {
            for (let x = 0; x < canvas.width; x += step) {
                const index = (x + y * canvas.width) * 4;
                if (imgData[index] > 128) {
                    coordinates.push(new THREE.Vector3(
                        (x - canvas.width / 2) * 0.1,
                        -(y - canvas.height / 2) * 0.1,
                        (Math.random() - 0.5) * 2
                    ));
                }
            }
        }
        return coordinates;
    }

    // ==========================================
    // 2. Three.js 初始化
    // ==========================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 40;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ==========================================
    // 3. 背景星空粒子系统 (填补空旷)
    // ==========================================
    const bgParticleCount = 3000;
    const bgGeometry = new THREE.BufferGeometry();
    const bgPositions = new Float32Array(bgParticleCount * 3);
    const bgColors = new Float32Array(bgParticleCount * 3);
    const colorHelper = new THREE.Color();

    for (let i = 0; i < bgParticleCount; i++) {
        // 分布在一个巨大的空间内
        bgPositions[i * 3] = (Math.random() - 0.5) * 300;
        bgPositions[i * 3 + 1] = (Math.random() - 0.5) * 300;
        bgPositions[i * 3 + 2] = (Math.random() - 0.5) * 200 - 50; 

        // 背景粒子赋予丰富的随机色彩 (偏向金、紫、蓝)
        colorHelper.setHSL(Math.random(), 0.8, 0.6);
        bgColors[i * 3] = colorHelper.r;
        bgColors[i * 3 + 1] = colorHelper.g;
        bgColors[i * 3 + 2] = colorHelper.b;
    }
    bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
    bgGeometry.setAttribute('color', new THREE.BufferAttribute(bgColors, 3));

    const bgMaterial = new THREE.PointsMaterial({
        size: 0.25,
        vertexColors: true,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending
    });
    const bgParticles = new THREE.Points(bgGeometry, bgMaterial);
    scene.add(bgParticles);

    // ==========================================
    // 4. 主干文字粒子系统 (高浓度 + 渐变色)
    // ==========================================
    const coordsText1 = getTextCoordinates("欢迎报考");
    const coordsText2 = getTextCoordinates("山西农业大学");
    const particleCount = Math.max(coordsText1.length, coordsText2.length);

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    
    // 初始化散乱在空间中
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 150;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
        targetPositions[i * 3] = positions[i * 3];
        targetPositions[i * 3 + 1] = positions[i * 3 + 1];
        targetPositions[i * 3 + 2] = positions[i * 3 + 2];
        
        // 初始赋予幽蓝色
        colorHelper.setHSL(0.6, 1.0, 0.5);
        colors[i * 3] = colorHelper.r;
        colors[i * 3 + 1] = colorHelper.g;
        colors[i * 3 + 2] = colorHelper.b;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const material = new THREE.PointsMaterial({ 
        size: 0.2, // 因为变密了，单颗粒子稍微缩小一点会更细腻
        vertexColors: true, // 开启顶点颜色！
        transparent: true, 
        opacity: 0.9, 
        blending: THREE.AdditiveBlending 
    });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // ==========================================
    // 5. 核心物理与状态变量
    // ==========================================
    let dispersionFactor = 1.0; 
    let entryOffset = new THREE.Vector3(0, 0, 0); 
    let currentTargetCoords = null;
    let time = 0; 

    // 切换目标并计算渐变色
    function changeTarget(coordsArray, hueStart, hueEnd) {
        const colorAttr = geometry.attributes.color;
        
        // 找出文字在 X 轴上的跨度，用来计算渐变
        let minX = Infinity, maxX = -Infinity;
        coordsArray.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
        });

        for (let i = 0; i < particleCount; i++) {
            const index = i % coordsArray.length;
            const targetX = coordsArray[index].x;
            targetPositions[i * 3] = targetX;
            targetPositions[i * 3 + 1] = coordsArray[index].y;
            targetPositions[i * 3 + 2] = coordsArray[index].z;

            // 根据 X 轴坐标，计算流光渐变色
            const ratio = (targetX - minX) / (maxX - minX); 
            const currentHue = hueStart + ratio * (hueEnd - hueStart);
            colorHelper.setHSL(currentHue, 1.0, 0.6);
            
            colorAttr.array[i * 3] = colorHelper.r;
            colorAttr.array[i * 3 + 1] = colorHelper.g;
            colorAttr.array[i * 3 + 2] = colorHelper.b;
        }
        colorAttr.needsUpdate = true;
    }

    // ==========================================
    // 6. MediaPipe 手势与滑动检测
    // ==========================================
    const videoElement = document.querySelector('.input_video');
    const gestureText = document.getElementById('gesture-text');
    let historyX = []; let historyY = []; let swipeCooldown = 0; 

    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            const wrist = landmarks[0];
            const middleTip = landmarks[12];
            const handSize = Math.sqrt(Math.pow(wrist.x - middleTip.x, 2) + Math.pow(wrist.y - middleTip.y, 2));
            dispersionFactor = Math.max(0.2, Math.min(3.0, (handSize - 0.1) * 7.0));

            const center = landmarks[9]; 
            historyX.push(center.x); historyY.push(center.y);
            if (historyX.length > 15) { historyX.shift(); historyY.shift(); }
            if (swipeCooldown > 0) swipeCooldown--;

            if (historyX.length === 15 && swipeCooldown === 0) {
                const dx = historyX[14] - historyX[0];
                const dy = historyY[14] - historyY[0];

                if (dy > 0.15 && Math.abs(dy) > Math.abs(dx)) {
                    gestureText.innerText = "向下滑动 (欢迎报考)";
                    currentTargetCoords = coordsText1;
                    // 从青色(0.4)渐变到蓝色(0.6)
                    changeTarget(coordsText1, 0.4, 0.6); 
                    entryOffset.set(0, 50, 0); 
                    swipeCooldown = 40; 
                } 
                else if (dx < -0.15 && Math.abs(dx) > Math.abs(dy)) {
                    gestureText.innerText = "向右滑动 (山西农业大学)";
                    currentTargetCoords = coordsText2;
                    // 从绿色(0.3)渐变到翠绿色(0.45)
                    changeTarget(coordsText2, 0.25, 0.45); 
                    entryOffset.set(-70, 0, 0); 
                    swipeCooldown = 40;
                }
            }
        } else {
            dispersionFactor += (1.0 - dispersionFactor) * 0.05;
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    cameraUtils.start().then(() => {
        document.getElementById('status-text').innerText = "系统状态：摄像头已就绪，AI全速运行";
        document.getElementById('status-text').style.color = "#00FF87";
    });

    // ==========================================
    // 7. 动画渲染循环
    // ==========================================
    function animate() {
        requestAnimationFrame(animate);
        time += 0.05;

        // 背景星空持续缓慢旋转、漂浮
        bgParticles.rotation.y += 0.001;
        bgParticles.rotation.x += 0.0005;

        entryOffset.lerp(new THREE.Vector3(0, 0, 0), 0.06);

        const posAttr = geometry.attributes.position;
        const currentArr = posAttr.array;

        for (let i = 0; i < particleCount; i++) {
            const idxX = i * 3;
            const idxY = i * 3 + 1;
            const idxZ = i * 3 + 2;

            let targetX = targetPositions[idxX] * dispersionFactor + entryOffset.x;
            let targetY = targetPositions[idxY] * dispersionFactor + entryOffset.y;
            let targetZ = targetPositions[idxZ] * dispersionFactor + entryOffset.z;

            // 微弱悬浮呼吸感
            targetY += Math.sin(time + i * 0.05) * 0.4;
            targetX += Math.cos(time + i * 0.05) * 0.2;

            currentArr[idxX] += (targetX - currentArr[idxX]) * 0.12;
            currentArr[idxY] += (targetY - currentArr[idxY]) * 0.12;
            currentArr[idxZ] += (targetZ - currentArr[idxZ]) * 0.12;
        }

        posAttr.needsUpdate = true;
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
